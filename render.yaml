services:
  - type: web
    name: sparklearn
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13

      - key: SECRET_KEY
        generateValue: true

      - key: GEMINI_API_KEY
        sync: false
