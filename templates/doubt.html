{% extends "base.html" %}

{% block title %}Doubt Section - SparkLearn{% endblock %}

{% block content %}
<section class="container">
    <h1>Ask a Doubt</h1>
    <form method="POST" class="form-card">
        <label>Your question</label>
        <textarea name="question" rows="5" placeholder="Ask anything about placement preparation">{{ question }}</textarea>
        <button class="btn btn-primary" type="submit">Ask</button>
    </form>
    {% if answer %}
    <div class="content-box">{{ answer }}</div>
    {% endif %}
</section>
{% endblock %}
