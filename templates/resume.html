{% extends "base.html" %}

{% block title %}Resume - SparkLearn{% endblock %}

{% block content %}
<section class="container">
    <h1>Resume Analyzer</h1>
    <form id="resumeForm" class="form-card">
        <label>Paste resume text</label>
        <textarea id="resumeText" rows="8"></textarea>
        <button class="btn btn-primary" type="submit">Analyze</button>
    </form>
    <pre id="resumeResult" class="content-box" style="display:none"></pre>
</section>
<script>
document.getElementById('resumeForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const result = document.getElementById('resumeResult');
    result.style.display = 'block';
    result.textContent = 'Thinking...';
    const res = await fetch('{{ url_for("analyze_resume") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({resume: document.getElementById('resumeText').value})
    });
    result.textContent = JSON.stringify(await res.json(), null, 2);
});
</script>
{% endblock %}
